<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>忘記密碼</title>
    <!-- css -->
    <link rel="stylesheet" href="js_css/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="js_css/font-awesome-4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="css/all_styles.css">
    <link rel="stylesheet" href="css/all_rwd.css">
</head>

<body>
    <div class="container-fluid forgotpassword">
        <form class="forgotpad" method="post">
            <div class="title">
                <h2>忘記密碼</h2>
            </div>
            <!-- ================= -->
            <div class="words">
                請在下方輸入你的電郵地址，我們會將重設密碼指示傳送給你。
            </div>
            <!-- ================= -->
            <div class="wordsarea">
                <input type="email" name="user" id="email" placeholder="請輸入電子郵件" required="required">
            </div>
            <!-- ================= -->
            <div class="buttons">
                <input type="submit" class="sendpassword" value="傳送電子郵件">
            </div>
        </form>
    </div>
</body>
<!-- js -->
<script src="js_css/jquery/dist/jquery.min.js"></script>
<script src="js_css/bootstrap/dist/js/bootstrap.min.js"></script>

</html>
